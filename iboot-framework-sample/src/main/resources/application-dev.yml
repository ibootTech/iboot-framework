server:
  port: 8081
spring:
  datasource:
    type: com.alibaba.druid.pool.DruidDataSource
    url:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username:
    password:
    filters: config,stat
    connectionProperties: config.decrypt=true;config.decrypt.key=
    schema:
    data:
    initialization-mode: always
    druid:
      filter:
        stat:
          slow-sql-millis: 3000
          log-slow-sql: true
          enabled: true
          db-type: mysql
      initial-size: 5
      min-idle: 5
      max-active: 20
      max-wait: 60000
      web-stat-filter:
        enabled: true
        exclusions: '*.js,*.gif,*.jpg,*.png,*.css,*.ico,/druid/*'
      stat-view-servlet:
        enabled: true
        url-pattern: /druid/*
        reset-enable: false
  quartz:
    jdbc:
      initialize-schema:
    job-store-type:
    properties:
      org:
        quartz:
          scheduler:
            instanceName: quartzScheduler
            instanceId: AUTO
          jobStore:
            clusterCheckinInterval: 20000
          threadPool:
            threadPriority: 5
            threadCount: 11
mybatis-plus:
  GlobalConfig:
    banner: false
    DbConfig:
      idType: ASSIGN_UUID
tech:
  iboot:
    database:
      druid:
        config:
          loginUsername:
          loginPassword:
